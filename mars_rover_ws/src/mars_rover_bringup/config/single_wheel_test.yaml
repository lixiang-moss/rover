# 单轮组真实测试配置。
# 该配置用于单轮硬件测试，默认进入 RAW_WHEEL_TEST，并把速度/角度限制得更保守。
drive_mode_manager:
  ros__parameters:
    # 启动后默认进入单轮测试模式，而不是普通驾驶模式。
    default_mode: RAW_WHEEL_TEST

four_wheel_kinematics:
  ros__parameters:
    # 单轮测试默认只启用 front_left；后续可通过 active_test_wheel 参数切换到其他单轮组。
    active_test_wheel: front_left
    # 单轮测试最大转向角，单位 rad；比普通限幅更小，降低扭线和误动作风险。
    max_steering_angle: 0.35
    # 单轮测试最大驱动速度，单位 m/s；保持很低，适合架空测试。
    max_drive_velocity: 0.03
    # 单轮测试转向速度限制，单位 rad/s。
    steering_velocity_limit: 0.15
    # 单轮测试驱动加速度限制，单位 m/s^2。
    drive_acceleration_limit: 0.05

stm32_bridge:
  ros__parameters:
    # bridge 侧记录当前真实测试轮组，默认 front_left；该参数可切换到其他单轮组。
    active_test_wheel: front_left
    # real_serial 模式必须显式 enable，避免误启动电机。
    require_enable_for_real_serial: true
    # 单轮测试策略只允许 RAW_WHEEL_TEST 中的一个轮组启用。
    hardware_output_mode: single_wheel
    # 默认关闭真实硬件输出；启动时必须显式设置为 true 才会发送 enabled=true。
    hardware_enable: false
